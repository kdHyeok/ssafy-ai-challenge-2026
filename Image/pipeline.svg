<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="620" viewBox="0 0 1500 620">
  <rect width="1500" height="620" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/></marker>
    <style>
      .title{font:700 38px Arial,sans-serif;fill:#111827}.box{stroke:#2563eb;stroke-width:3}.text{font:600 20px Arial,sans-serif;fill:#111827}.small{font:16px Arial,sans-serif;fill:#374151}.note{font:15px Arial,sans-serif;fill:#64748b}.arrow{stroke:#1f2937;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <text x="60" y="58" class="title">VQA Experiment Flow</text>
  <text x="60" y="88" class="note">최고점 연결 흐름과 후반 비교/실패 실험을 분리해 정리</text>

  <g text-anchor="middle">
    <rect x="55" y="145" width="185" height="105" rx="16" fill="#dbeafe" class="box"/><text x="147" y="185" class="text">3B Baseline</text><text x="147" y="214" class="small">0.70279</text>
    <line x1="250" y1="198" x2="300" y2="198" class="arrow"/>
    <rect x="310" y="145" width="205" height="105" rx="16" fill="#e0f2fe" class="box"/><text x="412" y="178" class="text">후보군 비교</text><text x="412" y="205" class="small">MiniCPM / Gemma</text><text x="412" y="228" class="small">Qwen3-VL-8B</text>
    <line x1="525" y1="198" x2="575" y2="198" class="arrow"/>
    <rect x="585" y="145" width="190" height="105" rx="16" fill="#dcfce7" class="box"/><text x="680" y="185" class="text">EDA / 데이터 진단</text><text x="680" y="214" class="small">dev agreement, 유형 분석</text>
    <line x1="785" y1="198" x2="835" y2="198" class="arrow"/>
    <rect x="845" y="145" width="205" height="105" rx="16" fill="#fef3c7" class="box"/><text x="947" y="178" class="text">Qwen3-VL-32B</text><text x="947" y="205" class="small">LoRA / 4bit</text><text x="947" y="228" class="small">prob_a~d 저장</text>
    <line x1="1060" y1="198" x2="1110" y2="198" class="arrow"/>
    <rect x="1120" y="145" width="225" height="105" rx="16" fill="#ede9fe" class="box"/><text x="1232" y="180" class="text">선택적 Thinking</text><text x="1232" y="208" class="small">저합의 샘플 재추론</text><text x="1232" y="231" class="small">0.94402</text>
  </g>

  <path d="M 947 255 C 947 310, 760 315, 760 370" fill="none" class="arrow"/>
  <path d="M 947 255 C 947 310, 1115 315, 1115 370" fill="none" class="arrow"/>
  <g text-anchor="middle">
    <rect x="620" y="370" width="280" height="110" rx="16" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="3"/><text x="760" y="410" class="text">Soft Ensemble 비교</text><text x="760" y="438" class="small">32B + 27B 계열</text><text x="760" y="462" class="small">0.941~0.943, 최고점 미초과</text>
    <rect x="975" y="370" width="280" height="110" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="3"/><text x="1115" y="410" class="text">Detection / TTA</text><text x="1115" y="438" class="small">공개 detector crop 후보</text><text x="1115" y="462" class="small">0.926~0.931, 후반 회고</text>
  </g>

  <text x="60" y="555" class="note">Falcon-Perception은 최종 제출 파이프라인이 아니라 일부 샘플 사후 확인과 후속 개선 아이디어로 분리했습니다.</text>
</svg>
