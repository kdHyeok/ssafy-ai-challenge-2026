<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720">
  <rect width="1500" height="720" fill="#ffffff"/>
  <defs>
    <style>
      .title{font:700 38px Arial,sans-serif;fill:#111827}
      .axis{stroke:#9ca3af;stroke-width:2}
      .grid{stroke:#e5e7eb;stroke-width:1}
      .tick{font:18px Arial,sans-serif;fill:#6b7280;text-anchor:end}
      .label{font:600 22px Arial,sans-serif;fill:#111827;text-anchor:middle}
      .small{font:18px Arial,sans-serif;fill:#374151;text-anchor:middle}
      .bartext{font:700 22px Arial,sans-serif;fill:#111827;text-anchor:middle}
    </style>
  </defs>
  <text x="60" y="60" class="title">SSAFY AI Challenge VQA Score Progression</text>
  <line x1="120" y1="600" x2="1380" y2="600" class="axis"/>
  <line x1="120" y1="120" x2="120" y2="600" class="axis"/>
  <line x1="120" y1="600.0" x2="1380" y2="600.0" class="grid"/><text x="100" y="607.0" class="tick">0.00</text>
  <line x1="120" y1="480.0" x2="1380" y2="480.0" class="grid"/><text x="100" y="487.0" class="tick">0.25</text>
  <line x1="120" y1="360.0" x2="1380" y2="360.0" class="grid"/><text x="100" y="367.0" class="tick">0.50</text>
  <line x1="120" y1="240.0" x2="1380" y2="240.0" class="grid"/><text x="100" y="247.0" class="tick">0.75</text>
  <line x1="120" y1="120.0" x2="1380" y2="120.0" class="grid"/><text x="100" y="127.0" class="tick">1.00</text>
  <g>
    <rect x="170" y="262.7" width="110" height="337.3" rx="4" fill="#9ca3af"/>
    <text x="225" y="240.7" class="bartext">0.70279</text>
    <text x="225" y="636" class="small">Baseline</text>
    <text x="225" y="660" class="small">Qwen2.5 3B</text>
  </g>
  <g>
    <rect x="320" y="224.0" width="110" height="376.0" rx="4" fill="#60a5fa"/>
    <text x="375" y="202.0" class="bartext">0.78341</text>
    <text x="375" y="636" class="small">MiniCPM</text>
    <text x="375" y="660" class="small">V-4_5</text>
  </g>
  <g>
    <rect x="470" y="202.5" width="110" height="397.5" rx="4" fill="#a78bfa"/>
    <text x="525" y="180.5" class="bartext">0.82815</text>
    <text x="525" y="636" class="small">Gemma 4</text>
    <text x="525" y="660" class="small">E4B-it</text>
  </g>
  <g>
    <rect x="620" y="198.5" width="110" height="401.5" rx="4" fill="#34d399"/>
    <text x="675" y="176.5" class="bartext">0.83643</text>
    <text x="675" y="636" class="small">Qwen3-VL</text>
    <text x="675" y="660" class="small">8B</text>
  </g>
  <g>
    <rect x="770" y="152.9" width="110" height="447.1" rx="4" fill="#f59e0b"/>
    <text x="825" y="130.9" class="bartext">0.93141</text>
    <text x="825" y="636" class="small">32B LoRA</text>
    <text x="825" y="660" class="small">prob logging</text>
  </g>
  <g>
    <rect x="920" y="147.1" width="110" height="452.9" rx="4" fill="#fb7185"/>
    <text x="975" y="125.1" class="bartext">0.94363</text>
    <text x="975" y="636" class="small">Soft</text>
    <text x="975" y="660" class="small">ensemble</text>
  </g>
  <g>
    <rect x="1070" y="146.9" width="110" height="453.1" rx="4" fill="#ef4444"/>
    <text x="1125" y="124.9" class="bartext">0.94402</text>
    <text x="1125" y="636" class="small">Detection/TTA</text>
    <text x="1125" y="660" class="small">final</text>
