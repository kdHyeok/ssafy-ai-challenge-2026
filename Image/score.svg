<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720">
  <rect width="1500" height="720" fill="#ffffff"/>
  <defs>
    <style>
      .title{font:700 38px Arial,sans-serif;fill:#111827}
      .subtitle{font:20px Arial,sans-serif;fill:#4b5563}
      .axis{stroke:#9ca3af;stroke-width:2}
      .grid{stroke:#e5e7eb;stroke-width:1}
      .tick{font:18px Arial,sans-serif;fill:#6b7280;text-anchor:end}
      .score{font:700 21px Arial,sans-serif;fill:#111827;text-anchor:middle;stroke:#ffffff;stroke-width:5;paint-order:stroke}
      .label{font:600 19px Arial,sans-serif;fill:#111827;text-anchor:middle}
      .small{font:17px Arial,sans-serif;fill:#4b5563;text-anchor:middle}
      .note{font:18px Arial,sans-serif;fill:#4b5563}
    </style>
    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="45%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <text x="60" y="58" class="title">SSAFY AI Challenge VQA Score Progression</text>
  <text x="60" y="90" class="subtitle">0.00–1.00 실제 점수 축으로 표시해 점수 차이를 과장하지 않았습니다.</text>

  <!-- Chart frame -->
  <line x1="130" y1="570" x2="1380" y2="570" class="axis"/>
  <line x1="130" y1="125" x2="130" y2="570" class="axis"/>

  <!-- Full 0.00-1.00 score axis prevents exaggerated height gaps. -->
  <line x1="130" y1="570.0" x2="1380" y2="570.0" class="grid"/><text x="112" y="576.0" class="tick">0.00</text>
  <line x1="130" y1="458.8" x2="1380" y2="458.8" class="grid"/><text x="112" y="464.8" class="tick">0.25</text>
  <line x1="130" y1="347.5" x2="1380" y2="347.5" class="grid"/><text x="112" y="353.5" class="tick">0.50</text>
  <line x1="130" y1="236.2" x2="1380" y2="236.2" class="grid"/><text x="112" y="242.2" class="tick">0.75</text>
  <line x1="130" y1="125.0" x2="1380" y2="125.0" class="grid"/><text x="112" y="131.0" class="tick">1.00</text>
  <line x1="130" y1="169.0" x2="1380" y2="169.0" class="grid" stroke-dasharray="6 6"/><text x="112" y="175.0" class="tick">0.90</text>

  <!-- Progression line: verified submitted scores only. -->
  <polyline points="180,257.3 380,221.4 580,201.5 780,197.8 980,155.5 1180,150.1 1320,149.9" fill="none" stroke="url(#lineGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Baseline -->
  <g>
    <circle cx="180" cy="257.3" r="12" fill="#60a5fa" stroke="#ffffff" stroke-width="4"/>
    <text x="180" y="229.3" class="score">0.70279</text>
    <text x="180" y="615" class="label">Baseline</text>
    <text x="180" y="640" class="small">Qwen2.5 3B</text>
  </g>

  <!-- MiniCPM -->
  <g>
    <circle cx="380" cy="221.4" r="12" fill="#38bdf8" stroke="#ffffff" stroke-width="4"/>
    <text x="380" y="193.4" class="score">0.78341</text>
    <text x="380" y="615" class="label">MiniCPM</text>
    <text x="380" y="640" class="small">V-4_5</text>
  </g>

  <!-- Gemma 4 -->
  <g>
    <circle cx="580" cy="201.5" r="12" fill="#a78bfa" stroke="#ffffff" stroke-width="4"/>
    <text x="580" y="173.5" class="score">0.82815</text>
    <text x="580" y="615" class="label">Gemma 4</text>
    <text x="580" y="640" class="small">E4B-it</text>
  </g>

  <!-- Qwen3-VL -->
  <g>
    <circle cx="780" cy="197.8" r="12" fill="#34d399" stroke="#ffffff" stroke-width="4"/>
    <text x="780" y="169.8" class="score">0.83643</text>
    <text x="780" y="615" class="label">Qwen3-VL</text>
    <text x="780" y="640" class="small">8B</text>
  </g>

  <!-- 32B LoRA -->
  <g>
    <circle cx="980" cy="155.5" r="12" fill="#f59e0b" stroke="#ffffff" stroke-width="4"/>
    <text x="980" y="121.5" class="score">0.93141</text>
    <text x="980" y="615" class="label">32B LoRA</text>
    <text x="980" y="640" class="small">prob logging</text>
  </g>

  <!-- Soft -->
  <g>
    <circle cx="1180" cy="150.1" r="12" fill="#fb7185" stroke="#ffffff" stroke-width="4"/>
    <text x="1180" y="185.1" class="score">0.94363</text>
    <text x="1180" y="615" class="label">Soft</text>
    <text x="1180" y="640" class="small">ensemble</text>
  </g>

  <!-- Detection/TTA -->
  <g>
    <circle cx="1320" cy="149.9" r="14" fill="#ef4444" stroke="#111827" stroke-width="3"/>
    <text x="1320" y="121.9" class="score">0.94402</text>
    <text x="1320" y="615" class="label">Detection/TTA</text>
    <text x="1320" y="640" class="small">final</text>
  </g>

  <text x="60" y="690" class="note">Score axis: 0.00–1.00. Final submission: 0.94402 with Detection/TTA pipeline.</text>
</svg>
